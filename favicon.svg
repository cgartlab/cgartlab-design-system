<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CGArtLab Design System">
  <title>CGArtLab Design System</title>
  <!-- Refined fountain-pen nib at 45 deg (tip down-left). Exactly two closed curves: the nib outline (slit = open notch at the tip) + the breather-hole circle; evenodd. Hex stops approximate the OKLch olive ramp. -->
  <defs>
    <linearGradient id="cg-nib" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a6a25f"/>
      <stop offset="0.55" stop-color="#6f6c39"/>
      <stop offset="1" stop-color="#46441f"/>
    </linearGradient>
  </defs>
  <path fill-rule="evenodd" clip-rule="evenodd" fill="url(#cg-nib)" transform="rotate(45 16 16)" d="M11 8C13.5 6.6 18.5 6.6 21 8C23.2 11 22 19 16.1 26.6L16.5 14C16.5 13.5 15.5 13.5 15.5 14L15.9 26.6C10 19 8.8 11 11 8ZM14.3 11.8a1.7 1.7 0 1 0 3.4 0a1.7 1.7 0 1 0 -3.4 0Z"/>
</svg>

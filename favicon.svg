<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CGArtLab Design System">
  <title>CGArtLab Design System</title>
  <!-- Minimal eye / aperture monogram drawn with exactly two closed curves: an almond lid + an iris circle. Hex stops approximate the OKLch olive ramp. -->
  <defs>
    <linearGradient id="cg-eye" x1="4" y1="6" x2="28" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a6a25f"/>
      <stop offset="0.55" stop-color="#6f6c39"/>
      <stop offset="1" stop-color="#46441f"/>
    </linearGradient>
    <radialGradient id="cg-iris" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#23241a"/>
      <stop offset="0.38" stop-color="#23241a"/>
      <stop offset="0.42" stop-color="#f1ebdc"/>
      <stop offset="1" stop-color="#d9d3c0"/>
    </radialGradient>
  </defs>
  <path fill="url(#cg-eye)" d="M3.5 16C9 6.8 23 6.8 28.5 16C23 25.2 9 25.2 3.5 16Z"/>
  <circle cx="16" cy="16" r="5" fill="url(#cg-iris)"/>
</svg>

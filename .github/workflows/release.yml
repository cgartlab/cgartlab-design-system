# 仅在主分支 release 时触发：构建 PDF 产物 + 检查产物大小
name: Build Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate PDFs
        run: |
          mkdir -p assets/downloads
          python3 tools/generate_pdfs.py

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: design-system-pdfs
          path: assets/downloads/*.pdf
          retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download PDFs
        uses: actions/download-artifact@v4
        with:
          name: design-system-pdfs
          path: assets/downloads/

      - name: Extract changelog
        id: changelog
        run: |
          awk '/^## \[/{flag=!flag; if(flag && !/Unreleased|未发布/) {capture=1}} capture' CHANGELOG.md | \
            awk 'BEGIN{count=0} /^## \[/{count++; if(count>1) exit} {print}' > /tmp/release-notes.md
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release-notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.RELEASE_NOTES }}
          files: assets/downloads/*.pdf
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

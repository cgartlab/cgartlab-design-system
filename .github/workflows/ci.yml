name: CI

on:
  push:
    branches: [main, dev/*, fix/*, write/*, release/**]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Make scripts executable
        run: chmod +x tools/validate_*.py scripts/*.py scripts/*.sh 2>/dev/null || true
      - id: tokens
        run: python3 tools/validate_tokens.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: naming
        run: python3 tools/validate_naming.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: html
        run: python3 tools/validate_html.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: a11y
        run: python3 tools/validate_a11y.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: versions
        run: python3 tools/validate_versions.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: links
        run: python3 tools/validate_links.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: cssref
        continue-on-error: true
        if: always()
        run: python3 tools/validate_cssref.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: darkmode
        continue-on-error: true
        if: always()
        run: python3 tools/validate_darkmode.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: verext
        continue-on-error: true
        if: always()
        run: python3 tools/validate_verext.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - id: hardcode
        continue-on-error: true
        if: always()
        run: python3 tools/validate_hardcode.py || rc=$?; if [ ${rc:-0} -eq 1 ]; then exit 1; elif [ ${rc:-0} -eq 2 ]; then exit 0; fi
      - name: Summarize
        if: always()
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Validator | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| tokens | ${{ steps.tokens.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| naming | ${{ steps.naming.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| html   | ${{ steps.html.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| a11y   | ${{ steps.a11y.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| versions | ${{ steps.versions.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| links  | ${{ steps.links.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cssref  | ${{ steps.cssref.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| darkmode | ${{ steps.darkmode.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| verext  | ${{ steps.verext.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| hardcode | ${{ steps.hardcode.outcome }} |" >> $GITHUB_STEP_SUMMARY
      - name: Check for failures
        if: always()
        run: |
          FAILED=""
          # Only blocking validators (no continue-on-error)
          if [ "${{ steps.tokens.outcome }}" = "failure" ]; then FAILED="$FAILED tokens"; fi
          if [ "${{ steps.naming.outcome }}" = "failure" ]; then FAILED="$FAILED naming"; fi
          if [ "${{ steps.html.outcome }}" = "failure" ]; then FAILED="$FAILED html"; fi
          if [ "${{ steps.a11y.outcome }}" = "failure" ]; then FAILED="$FAILED a11y"; fi
          if [ "${{ steps.versions.outcome }}" = "failure" ]; then FAILED="$FAILED versions"; fi
          if [ "${{ steps.links.outcome }}" = "failure" ]; then FAILED="$FAILED links"; fi
          # NOTE: cssref/darkmode/verext/hardcode use continue-on-error=true
          # (soft failures / warnings only) — excluded from blocking check
          if [ -n "$FAILED" ]; then
            echo "❌ Failed validators:$FAILED"
            exit 1
          fi
          echo "✅ All blocking validators passed"
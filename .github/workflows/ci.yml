name: CI

on:
  push:
    branches: [main, dev/*, fix/*, write/*, release/**]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Make scripts executable
        run: chmod +x tools/validate_*.py
      - id: tokens
        run: python3 tools/validate_tokens.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: naming
        run: python3 tools/validate_naming.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: html
        run: python3 tools/validate_html.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: a11y
        run: python3 tools/validate_a11y.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: versions
        run: python3 tools/validate_versions.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: links
        run: python3 tools/validate_links.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: cssref
        run: python3 tools/validate_cssref.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: darkmode
        run: python3 tools/validate_darkmode.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: verext
        run: python3 tools/validate_verext.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - id: hardcode
        run: python3 tools/validate_hardcode.py; c=$?; if [ $c -eq 1 ]; then exit 1; elif [ $c -eq 2 ]; then exit 0; fi
      - name: Summarize
        if: always()
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Validator | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| tokens | ${{ steps.tokens.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| naming | ${{ steps.naming.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| html   | ${{ steps.html.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| a11y   | ${{ steps.a11y.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| versions | ${{ steps.versions.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| links  | ${{ steps.links.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cssref  | ${{ steps.cssref.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| darkmode | ${{ steps.darkmode.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| verext  | ${{ steps.verext.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| hardcode | ${{ steps.hardcode.outcome }} |" >> $GITHUB_STEP_SUMMARY

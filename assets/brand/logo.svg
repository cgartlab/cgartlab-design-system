<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" role="img" aria-label="EDIC Design System">
  <title>EDIC Design System</title>
  <!-- Refined fountain-pen nib at 45 deg (tip down-left; two closed curves: outline with slit notch + breather hole) + editorial wordmark. Hex stops approximate the OKLch olive ramp. -->
  <defs>
    <linearGradient id="cg-nib" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a6a25f"/>
      <stop offset="0.55" stop-color="#6f6c39"/>
      <stop offset="1" stop-color="#46441f"/>
    </linearGradient>
  </defs>
  <!-- Nib mark (48x48) -->
  <svg x="6" y="8" width="48" height="48" viewBox="0 0 32 32">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="url(#cg-nib)" transform="rotate(45 16 16)" d="M11 8C13.5 6.6 18.5 6.6 21 8C23.2 11 22 19 16.1 26.6L16.5 14C16.5 13.5 15.5 13.5 15.5 14L15.9 26.6C10 19 8.8 11 11 8ZM14.3 11.8a1.7 1.7 0 1 0 3.4 0a1.7 1.7 0 1 0 -3.4 0Z"/>
  </svg>
  <!-- Wordmark -->
  <text x="70" y="34" font-family="'Iowan Old Style','Charter',Georgia,'Times New Roman',serif" font-size="25" font-weight="700" fill="#211f1b" letter-spacing="-0.3">EDIC</text>
  <text x="71" y="50" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" font-size="9" font-weight="600" fill="#5c5a32" letter-spacing="3.4">DESIGN SYSTEM</text>
</svg>

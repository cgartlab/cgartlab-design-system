<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" role="img" aria-label="CGArtLab Design System">
  <title>CGArtLab Design System</title>
  <!-- Minimal eye / aperture monogram (two closed curves: almond lid + iris circle) + editorial wordmark. Hex stops approximate the OKLch olive ramp. -->
  <defs>
    <linearGradient id="cg-eye" x1="4" y1="6" x2="28" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a6a25f"/>
      <stop offset="0.55" stop-color="#6f6c39"/>
      <stop offset="1" stop-color="#46441f"/>
    </linearGradient>
    <radialGradient id="cg-iris" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#23241a"/>
      <stop offset="0.38" stop-color="#23241a"/>
      <stop offset="0.42" stop-color="#f1ebdc"/>
      <stop offset="1" stop-color="#d9d3c0"/>
    </radialGradient>
  </defs>
  <!-- Eye mark (48x48) -->
  <svg x="6" y="8" width="48" height="48" viewBox="0 0 32 32">
    <path fill="url(#cg-eye)" d="M2.6 16C10.4 7 21.6 7 29.4 16C21.6 25 10.4 25 2.6 16Z"/>
    <circle cx="16" cy="16" r="5" fill="url(#cg-iris)"/>
  </svg>
  <!-- Wordmark -->
  <text x="70" y="34" font-family="'Iowan Old Style','Charter',Georgia,'Times New Roman',serif" font-size="25" font-weight="700" fill="#211f1b" letter-spacing="-0.3">CGArtLab</text>
  <text x="71" y="50" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" font-size="9" font-weight="600" fill="#5c5a32" letter-spacing="3.4">DESIGN SYSTEM</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" role="img" aria-label="CGArtLab Design System">
  <title>CGArtLab Design System (on dark)</title>
  <!-- Minimal eye / aperture monogram (two closed curves) for dark backgrounds + editorial wordmark. Olive lid brightened so it glows on ink. -->
  <defs>
    <linearGradient id="cg-eye-d" x1="4" y1="6" x2="28" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c0bb74"/>
      <stop offset="0.55" stop-color="#8a8740"/>
      <stop offset="1" stop-color="#5f5d2c"/>
    </linearGradient>
    <radialGradient id="cg-iris-d" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#23241a"/>
      <stop offset="0.38" stop-color="#23241a"/>
      <stop offset="0.42" stop-color="#f3eee0"/>
      <stop offset="1" stop-color="#ddd7c5"/>
    </radialGradient>
  </defs>
  <!-- Eye mark (48x48) -->
  <svg x="6" y="8" width="48" height="48" viewBox="0 0 32 32">
    <path fill="url(#cg-eye-d)" d="M3.5 16C9 6.8 23 6.8 28.5 16C23 25.2 9 25.2 3.5 16Z"/>
    <circle cx="16" cy="16" r="5" fill="url(#cg-iris-d)"/>
  </svg>
  <!-- Wordmark -->
  <text x="70" y="34" font-family="'Iowan Old Style','Charter',Georgia,'Times New Roman',serif" font-size="25" font-weight="700" fill="#f1eee6" letter-spacing="-0.3">CGArtLab</text>
  <text x="71" y="50" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" font-size="9" font-weight="600" fill="#a8a55f" letter-spacing="3.4">DESIGN SYSTEM</text>
</svg>
